services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barakah_agent
      POSTGRES_USER: barakah
      POSTGRES_PASSWORD: barakah_dev
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barakah -d barakah_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://barakah:barakah_dev@postgres:5432/barakah_agent
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: .env
        required: false

volumes:
  pgdata:

